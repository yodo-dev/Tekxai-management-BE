server {
    listen 80;
    server_name tekxai.services www.tekxai.services;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tekxai.services www.tekxai.services;

    # SSL — update paths if your cert location differs
    ssl_certificate     /etc/letsencrypt/live/tekxai.services/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tekxai.services/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend — static files
    root /var/www/html;
    index index.html;

    # Uploaded files
    location /uploads/ {
        alias /home/ubuntu/tekxai-management-BE/uploads/;
        add_header Cache-Control "public, max-age=31536000";
        add_header X-Content-Type-Options nosniff;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 25M;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
